<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Bill Calculator</title>
    <style>
        :root {
            --bg: #0a0c10;
            --panel: rgba(22, 27, 34, 0.8);
            --accent: #58a6ff;
            --success: #238636;
            --text: #c9d1d9;
            --border: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 139, 253, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(35, 134, 54, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 20px;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 800;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .box label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }

        /* Calculation Dashboard - Always Visible */
        .dashboard {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dash-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .dash-row span:first-child {
            color: #8b949e;
        }

        .dash-row span:last-child {
            color: #f0f6fc;
            font-weight: 600;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 15px 0;
        }

        .total-display {
            text-align: center;
        }

        .total-display p {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .total-display h2 {
            font-size: 42px;
            color: #39d353;
            text-shadow: 0 0 20px rgba(57, 211, 83, 0.2);
        }

        /* Hide arrows in input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Bill Report</h1>
        </div>

        <div class="input-section">
            <div class="box">
                <label>Old Reading</label>
                <input type="number" id="oldR" placeholder="0" oninput="calc()">
            </div>
            <div class="box">
                <label>New Reading</label>
                <input type="number" id="newR" placeholder="0" oninput="calc()">
            </div>
        </div>

        <div class="dashboard">
            <div class="dash-row">
                <span>Reading Difference</span>
                <span id="diff">0</span>
            </div>
            <div class="dash-row">
                <span>Units Used</span>
                <span id="units">0 Units</span>
            </div>
            <div class="dash-row">
                <span>Current Rate</span>
                <span>₹10.00 / unit</span>
            </div>

            <div class="divider"></div>

            <div class="total-display">
                <p>TOTAL AMOUNT</p>
                <h2 id="total">₹0</h2>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const o = parseFloat(document.getElementById('oldR').value) || 0;
            const n = parseFloat(document.getElementById('newR').value) || 0;
            
            const diff = n - o;
            const units = diff > 0 ? diff : 0;
            const bill = units * 10;

            document.getElementById('diff').innerText = n + " - " + o;
            document.getElementById('units').innerText = units + " Units";
            document.getElementById('total').innerText = "₹" + bill.toLocaleString();
            
            // Text color change if negative
            if (n < o && n !== 0) {
                document.getElementById('diff').style.color = "#ff7b72";
            } else {
                document.getElementById('diff').style.color = "#f0f6fc";
            }
        }
    </script>

</body>
</html>
